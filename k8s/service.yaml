apiVersion: v1
kind: Service
metadata:
  name: weather-api
  labels:
    app: weather-api
  annotations:
    # Ensures AWS provisions a Classic Load Balancer (NLB also works)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: weather-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
